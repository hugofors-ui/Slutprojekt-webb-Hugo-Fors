<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logga In</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/logga-in.css" />
  </head>
  <body>
    <header>
      <a href="index.html" class="chatgpt-logo-link">
        <img
          src="images/ChatGPT Image 17 apr. 2026 22_33_01.png"
          alt="ChatGPT-logo"
        />
      </a>
      <span class="tag">Välkommen tillbaka</span>
      <h1>Logga in</h1>
      <p>Fyll i dina uppgifter för att komma åt ditt konto.</p>
    </header>

    <main>
      <div class="card">
        <h2>Ditt konto</h2>

        <div class="form-group">
          <label for="email">E-postadress</label>
          <input type="email" id="email" placeholder="namn@exempel.se" />
        </div>

        <div class="form-group">
          <label for="password">Lösenord</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>

        <button class="btn">Logga in</button>

        <div class="divider">eller</div>

        <div class="link-row">
          Inget konto? <a href="#">Registrera dig här</a>
        </div>
        <div class="link-row" style="margin-top: 0.6rem">
          <a href="#">Glömt lösenordet?</a>
        </div>
      </div>
    </main>

    <footer>&copy; 2026 Företaget AB · Alla rättigheter förbehållna</footer>
  </body>
</html>
